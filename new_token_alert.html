<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New Token Alert</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            line-height: 1.5;
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; }

        .back-button {
            display: inline-flex;
            align-items: center;
            color: var(--tg-theme-button-color, #0088cc);
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            font-weight: 500;
        }
        .back-button:hover { opacity: 0.8; }

        h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }

        .description {
            font-size: 15px;
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .submit-btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background-color: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer;
            transition: opacity 0.3s;
            margin-bottom: 12px;
        }
        .submit-btn:hover { opacity: 0.9; }

        .unsub-btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: 1px solid var(--tg-theme-hint-color, #999);
            border-radius: 8px;
            background-color: transparent;
            color: var(--tg-theme-text-color, #000);
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .unsub-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button">&larr; Back to Home</a>
        <h1>New Token Alert</h1>
        <p class="description">Get notified whenever a new token is listed on Hyperliquid.</p>

        <button id="toggle-btn" class="submit-btn" disabled onclick="toggleSubscription()">Loading...</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp || {
            expand: () => {},
            sendData: (data) => console.log('Would send to Telegram:', data),
            initData: '',
            initDataUnsafe: {}
        };
        tg.expand();
        tg.MainButton.hide();

        const params = new URLSearchParams(window.location.search);
        const isSubscribed = params.get('nts') === '1';

        const btn = document.getElementById('toggle-btn');
        if (isSubscribed) {
            btn.textContent = 'Unsubscribe';
            btn.className = 'unsub-btn';
        } else {
            btn.textContent = 'Subscribe';
            btn.className = 'submit-btn';
        }
        btn.disabled = false;

        function toggleSubscription() {
            if (isSubscribed) {
                tg.sendData(JSON.stringify({ type: "unsub_new_token", data: {} }));
            } else {
                tg.sendData(JSON.stringify({ type: "sub_new_token", data: {} }));
            }
        }
    </script>
</body>
</html>
