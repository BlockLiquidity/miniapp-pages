<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spot Transfer Alert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            color: var(--tg-theme-button-color, #0088cc);
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            font-weight: 500;
        }

        .back-button:hover {
            opacity: 0.8;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--tg-theme-text-color, #000000);
        }

        .description {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--tg-theme-text-color, #000000);
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #999999);
            border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            outline: none;
            transition: border-color 0.3s;
            appearance: none;
        }

        input:focus {
            border-color: var(--tg-theme-button-color, #0088cc);
        }

        .submit-btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background-color: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 8px;
            margin-bottom: 24px;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .error-message {
            color: #ff3b30;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .hint-text {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999999);
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="index.html" class="back-button">← Back to Home</a>
        <h1>🔄 Spot Transfer Alert</h1>
        <p class="description">
            Get notified when a Hyperliquid spot transfer crosses the HyperCore↔HyperEVM bridge
            (sender or receiver is <code>0x2222…2222</code>) with a USD value at or above your threshold.
        </p>

        <form id="configForm">
            <div class="form-group">
                <label for="threshold">Minimum threshold (USD)</label>
                <input
                    type="text"
                    inputmode="decimal"
                    id="threshold"
                    name="threshold"
                    placeholder="e.g. 1000"
                    required
                >
                <div class="hint-text">Only transfers worth at least this many USD will alert.</div>
                <div class="error-message" id="thresholdError"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Save Alert</button>
        </form>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp || {
            expand: () => {},
            sendData: (data) => console.log('Would send to Telegram:', data),
            initDataUnsafe: {}
        };
        tg.expand();
        tg.MainButton.hide();

        const form = document.getElementById('configForm');
        const thresholdInput = document.getElementById('threshold');
        const thresholdError = document.getElementById('thresholdError');

        // Helper: Parse Input (Mobile Friendly) — accept comma as decimal separator.
        function parseInput(val) {
            if (!val) return NaN;
            return parseFloat(val.replace(/,/g, '.'));
        }

        function validateForm() {
            let isValid = true;
            document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));

            const thresholdVal = parseInput(thresholdInput.value);
            if (!thresholdInput.value || isNaN(thresholdVal) || thresholdVal < 0) {
                thresholdError.textContent = 'Please enter a valid positive USD amount';
                thresholdError.classList.add('show');
                isValid = false;
            }

            return isValid;
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            if (!validateForm()) return;

            const formData = {
                threshold: parseInput(thresholdInput.value)
            };

            try {
                const jsonData = JSON.stringify({
                    type: "spot",
                    data: formData
                });

                tg.sendData(jsonData);

                if (!tg.initDataUnsafe.user) {
                    console.log('OUTPUT DATA:', jsonData);
                    alert('Alert saved! Check console for data.');
                }
            } catch (error) {
                console.error('Error sending data:', error);
            }
        });
    </script>
</body>

</html>
